<!DOCTYPE html>
<html>
<head>
	<title>chat thingy</title>

	<style>
		body { background:#eef2ff; font-family:"Times New Roman"; margin:0; }

		#layout { display:flex; width:1000px; margin:20px auto; gap:10px; }

		#container {
			width:700px; background:white; border:1px solid #aaa;
			padding:10px; display:flex; flex-direction:column; height:80vh;
		}

		h1 { font-size:20px; margin:0 0 10px 0; color:#800000; }

		#messages {
			flex:1; overflow-y:auto; border:1px solid #ddd;
			padding:5px; margin-bottom:10px; list-style:none;
		}

		.msg {
			display:flex;      
			gap:10px;
			padding:6px;
			border-bottom:1px solid #eee;
			align-items:flex-start;
		}

		.msg img {
			max-width:120px;
			max-height:120px;
			border:1px solid #aaa;
		}

		.msg-content {
			flex:1;
		}

		.name { color:#117743; font-weight:bold; }

		.msgid { color:#888; font-size:11px; margin-left:6px; }

	.reply-inline {
		color: #000;
		font-size: inherit;
		font-weight: normal;
		display: block;
		margin-bottom: 2px;
	}

		form { display:flex; gap:5px; }

		input { padding:5px; border:1px solid #aaa; }

		#boards { display:flex; justify-content:center; gap:10px; margin-top:10px; }

		.boardBtn { padding:5px; border:1px solid #888; background:#eee; cursor:pointer; }
		.boardBtn.active { background:#ddd; }

		#threadsPanel {
			width:250px; background:white; border:1px solid #aaa;
			padding:10px; display:flex; flex-direction:column; height:80vh;
		}

		#threadList { flex:1; overflow-y:auto; border:1px solid #ddd; }

		.threadItem { padding:6px; border-bottom:1px solid #eee; cursor:pointer; }

		.reply-btn {
			font-size:12px;
			color:#555;
			cursor:pointer;
		}
	</style>
</head>

<body>

<div id="layout">

<div id="container">
	<h1 id="title">/main/ :3</h1>

	<ul id="messages"></ul>

	<form id="form">
		<input id="input" placeholder="message..." />
		<button>send</button>
	</form>

	<input type="file" id="imageFile" />
	<input id="username" placeholder="username" />


	<div id="boards">
		<button class="boardBtn active" data-board="main">/main/</button>
		<button class="boardBtn" data-board="b">/b/</button>
		<button class="boardBtn" data-board="food">/food/</button>
		<button class="boardBtn" data-board="images">/images/</button>
	</div>
</div>

<div id="threadsPanel">
	<div id="threadList"></div>
	<button id="newThreadBtn">+ thread</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let userId = localStorage.getItem("userId") || Math.floor(Math.random()*999999);
localStorage.setItem("userId", userId);

let username = localStorage.getItem("username") || "u.n. owen";
let currentBoard = "main";
let replyTarget = null;

const socket = io();

socket.emit("register", { userId, username, board: currentBoard });

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const form = document.getElementById("form");
const title = document.getElementById("title");
const usernameInput = document.getElementById("username");

usernameInput.value = username;

usernameInput.addEventListener("input", () => {
	username = usernameInput.value.trim();

	if (!username) {
		username = "u.n. owen";
	}

	localStorage.setItem("username", username);

	socket.emit("register", {
		userId,
		username,
		board: currentBoard
	});
});

document.querySelectorAll(".boardBtn").forEach(btn => {
	btn.onclick = () => {
		currentBoard = btn.dataset.board;
		title.innerText = `/${currentBoard}/ :3`;

		document.querySelectorAll(".boardBtn").forEach(b=>b.classList.remove("active"));
		btn.classList.add("active");

		socket.emit("switch board", currentBoard);
	};
});

document.getElementById("newThreadBtn").onclick = () => {
	let name = prompt("thread name (max 30 chars)");
	if (!name) return;
	name = name.trim().slice(0,30);
	socket.emit("create thread", name);
};

socket.on("threads update", (threads)=>{
	const list = document.getElementById("threadList");
	list.innerHTML="";
	threads.forEach(t=>{
		let d=document.createElement("div");
		d.className="threadItem";
		d.innerText=t.name;
		d.onclick=()=>{
			currentBoard=t.id;
			title.innerText=t.name+" :3";
			socket.emit("switch board", t.id);
		};
		list.appendChild(d);
	});
});

form.onsubmit = async (e)=>{
	e.preventDefault();

	let text=input.value.trim();
	let image=null;

	const file=document.getElementById("imageFile").files[0];
	if(file){
		const r=new FileReader();
		image=await new Promise(res=>{
			r.onload=()=>res(r.result);
			r.readAsDataURL(file);
		});
	}

	if(!text && !image) return;

	socket.emit("chat message",{text,image,replyTo:replyTarget});

	input.value="";
	replyTarget=null;
	input.placeholder="message...";
	
	document.getElementById("imageFile").value = "";
};

function render(msg){
	let li=document.createElement("li");
	li.className="msg";

	li.innerHTML=`
		${msg.image ? `<img src="${msg.image}">` : ""}
		<div class="msg-content">
			<div>
				<span class="name">${msg.name}</span>
				<span class="msgid">no. ${msg.msgId}</span>
			</div>
			<div>
				${msg.replyTo ? `<span class="reply-inline">>>${msg.replyTo}</span>` : ""}
				${msg.text}
			</div>
			<div class="reply-btn">[reply]</div>
		</div>
	`;

	li.querySelector(".reply-btn").onclick=()=>{
		replyTarget=msg.msgId;
		input.placeholder="replying to >>"+msg.msgId;
		input.focus();
	};

	messages.appendChild(li);
	messages.scrollTop=messages.scrollHeight;
}

socket.on("chat history",(h)=>{
	messages.innerHTML="";
	h.forEach(render);
});

socket.on("chat message",(d)=>{
	if(d.board!==currentBoard) return;
	render(d.msg);
});
</script>

</body>
</html>
