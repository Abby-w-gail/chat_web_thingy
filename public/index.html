<!DOCTYPE html>
<html>
<head>
	<title>chat thingy</title>

	<style>
		body {
			background: #eef2ff;
			font-family: "Times New Roman", serif;
			margin: 0;
		}
		
		h1 {
			font-size: 20px;
			margin: 0 0 10px 0;
			color: #800000;
		}

		#container {
			width: 700px;
			margin: 20px auto;
			background: white;
			border: 1px solid #aaa;
			padding: 10px;
			display: flex;
			flex-direction: column;
			height: 80vh;
			box-sizing: border-box;
		}

		#messages {
			flex: 1;
			overflow-y: auto;
			border: 1px solid #ddd;
			padding: 5px;
			margin-bottom: 10px;
			list-style: none;
		}

		.msg {
			display: flex;
			gap: 10px;
			padding: 6px;
			border-bottom: 1px solid #eee;
		}

		.msg img {
			max-width: 120px;
			max-height: 120px;
			border: 1px solid #aaa;
		}

		.name {
			color: #117743;
			font-weight: bold;
		}

		.text {
			white-space: pre-wrap;
			overflow-wrap: break-word;
		}

		form {
			display: flex;
			gap: 5px;
			margin-bottom: 5px;
		}

		input {
			padding: 5px;
			border: 1px solid #aaa;
		}

		#boards {
			display: flex;
			justify-content: center;
			gap: 10px;
			margin-top: 10px;
		}

		.boardBtn {
			padding: 5px 10px;
			border: 1px solid #888;
			background: #eee;
			cursor: pointer;
		}

		.boardBtn.active {
			background: #ddd;
			font-weight: bold;
		}
		
		.time {
			font-size: 10px;
			color: #666;
			margin-top: 3px;
		}
		
		.actions {
			margin-top: 4px;
		}

		.reply-btn {
			font-size: 12px;
			color: #555;
			cursor: pointer;
			user-select: none;
		}

		.reply-btn:hover {
			text-decoration: underline;
			color: #000;
		}
	</style>
</head>

<body>

<div id="container">
	<h1>Chat :3</h1>
	
	
	<ul id="messages"></ul>

	<form id="form">
		<input id="input" autocomplete="off" placeholder="message..." />
		<button>send</button>
	</form>

	<input type="file" id="imageFile" />
	<input id="username" placeholder="username" />

	<div id="boards">
		<button class="boardBtn active" data-board="main">/main/</button>
		<button class="boardBtn" data-board="b">/b/</button>
	</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
	console.log("loaded");

	// =====================
	// ID
	// =====================
	let userId = localStorage.getItem("userId");

	if (!userId) {
		userId = Math.floor(100000 + Math.random() * 900000).toString();
		localStorage.setItem("userId", userId);
	}

	let username = localStorage.getItem("username") || "u.n. owen";
	let currentBoard = "main";
	let replyTarget = null;

	// =====================
	// SOCKET
	// =====================
	const socket = io();

	socket.emit("register", {
		userId,
		username,
		board: currentBoard
	});

	// =====================
	// UI
	// =====================
	const form = document.getElementById("form");
	const input = document.getElementById("input");
	const messages = document.getElementById("messages");
	const imageFileInput = document.getElementById("imageFile");
	const usernameInput = document.getElementById("username");

	usernameInput.value = username;

	usernameInput.addEventListener("input", () => {
		username = usernameInput.value;
		localStorage.setItem("username", username);

		socket.emit("register", {
			userId,
			username,
			board: currentBoard
		});
	});

	// =====================
	// BOARDS
	// =====================
	document.querySelectorAll(".boardBtn").forEach(btn => {
		btn.onclick = () => {
			currentBoard = btn.dataset.board;

			document.querySelectorAll(".boardBtn").forEach(b =>
				b.classList.remove("active")
			);
			btn.classList.add("active");

			socket.emit("switch board", currentBoard);
		};
	});

	// =====================
	// HELPERS
	// =====================
	function fileToBase64(file) {
		return new Promise((res, rej) => {
			const r = new FileReader();
			r.onload = () => res(r.result);
			r.onerror = rej;
			r.readAsDataURL(file);
		});
	}

	function escapeHtml(str) {
		return str
			.replace(/&/g, "&amp;")
			.replace(/</g, "&lt;")
			.replace(/>/g, "&gt;");
	}
	
	function formatTime(ts) {
		const d = new Date(ts);

		const hh = String(d.getHours()).padStart(2, "0");
		const mm = String(d.getMinutes()).padStart(2, "0");
		const ss = String(d.getSeconds()).padStart(2, "0");

		const dd = String(d.getDate()).padStart(2, "0");
		const mo = String(d.getMonth() + 1).padStart(2, "0");
		const yy = String(d.getFullYear()).slice(-2);

		return `${hh}:${mm}:${ss} - ${dd}/${mo}/${yy}`;
	}

	function render(msg) {
		const li = document.createElement("li");
		li.className = "msg";
		li.dataset.id = msg.id;

		li.innerHTML = `
			${msg.replyTo ? `<div class="reply">>>${msg.replyTo}</div>` : ""}
			${msg.image ? `<img src="${msg.image}">` : ""}
			<div class="msg-content">
				<div class="name">${escapeHtml(msg.name)}</div>
				<div class="text">${escapeHtml(msg.text)}</div>
				<div class="time">${formatTime(msg.time)}</div>
				<div class="actions">
					<span class="reply-btn">[reply]</span>
				</div>
			</div>
		`;

		li.querySelector(".reply-btn").onclick = (e) => {
			e.stopPropagation(); // prevents other clicks

			replyTarget = msg.userId;
			input.placeholder = "replying to >>" + msg.userId;
			input.focus();
		};

		messages.appendChild(li);
		messages.scrollTop = messages.scrollHeight;
	}

	// =====================
	// SEND
	// =====================
	form.addEventListener("submit", async (e) => {
		e.preventDefault();

		const text = input.value.trim();
		let image = null;

		if (imageFileInput.files.length > 0) {
			image = await fileToBase64(imageFileInput.files[0]);
		}

		if (!text && !image) return;

		socket.emit("chat message", {
			text,
			image,
			replyTo: replyTarget
		});

		input.value = "";
		imageFileInput.value = "";

		replyTarget = null;
		input.placeholder = "message...";
	});

	// =====================
	// RECEIVE
	// =====================
	socket.on("chat history", (history) => {
		messages.innerHTML = "";
		history.forEach(render);
	});

	socket.on("chat message", (data) => {
		// only show current board
		if (data.board !== currentBoard) return;

		render(data.msg);
	});
</script>

</body>
</html>
