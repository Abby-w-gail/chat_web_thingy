<!DOCTYPE html>
<html>
<head>
	<title>chat thingy</title>

	<style>
		body {
			background: #eef2ff;
			font-family: "Times New Roman", serif;
			margin: 0;
		}

		#container {
			width: 700px;
			margin: 20px auto;
			background: white;
			border: 1px solid #aaa;
			padding: 10px;

			display: flex;
			flex-direction: column;
			height: 80vh;
			box-sizing: border-box;
		}

		h1 {
			font-size: 20px;
			margin: 0 0 10px 0;
			color: #800000;
		}

		/* CHAT AREA */
		#messages {
			flex: 1;
			overflow-y: auto;
			border: 1px solid #ddd;
			padding: 5px;
			margin: 0 0 10px 0;

			list-style: none;
			box-sizing: border-box;
		}

		.msg {
			display: flex;
			gap: 10px;
			padding: 6px;
			border-bottom: 1px solid #eee;
			align-items: flex-start;
		}

		.msg img {
			max-width: 120px;
			max-height: 120px;
			border: 1px solid #aaa;
		}

		.msg-content {
			display: flex;
			flex-direction: column;
			max-width: 100%;
		}

		.name {
			color: #117743;
			font-weight: bold;
		}

		.text {
			white-space: pre-wrap;
			overflow-wrap: break-word;
		}

		/* INPUT AREA */
		form {
			display: flex;
			gap: 5px;
			margin-bottom: 5px;
		}

		input {
			padding: 5px;
			border: 1px solid #aaa;
			font-family: inherit;
			box-sizing: border-box;
		}

		#input {
			flex: 1;
		}

		button {
			padding: 5px 10px;
			cursor: pointer;
			border: 1px solid #888;
			background: #eee;
		}

		button:hover {
			background: #ddd;
		}

		#username {
			width: 100%;
			margin-top: 5px;
		}

		#imageFile {
			margin-top: 5px;
		}
	</style>
</head>

<body>

<div id="container">
	<h1>Chat :3</h1>

	<ul id="messages"></ul>

	<form id="form">
		<input id="input" placeholder="message..." autocomplete="off" />
		<button>send</button>
	</form>

	<input type="file" id="imageFile" />
	<input id="username" placeholder="username" />
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
	console.log("script loaded");

	// =====================
	// STABLE USER ID
	// =====================
	let userId = localStorage.getItem("userId");

	if (!userId) {
		userId = Math.floor(100000 + Math.random() * 900000).toString();
		localStorage.setItem("userId", userId);
	}

	let username = localStorage.getItem("username") || "anon";

	const socket = io();

	socket.emit("register", {
		userId,
		username
	});

	// =====================
	// ELEMENTS
	// =====================
	const form = document.getElementById("form");
	const input = document.getElementById("input");
	const messages = document.getElementById("messages");
	const imageFileInput = document.getElementById("imageFile");
	const usernameInput = document.getElementById("username");

	usernameInput.value = username;

	usernameInput.addEventListener("input", () => {
		username = usernameInput.value;
		localStorage.setItem("username", username);

		socket.emit("register", {
			userId,
			username
		});
	});

	// =====================
	// HELPERS
	// =====================
	function fileToBase64(file) {
		return new Promise((res, rej) => {
			const r = new FileReader();
			r.onload = () => res(r.result);
			r.onerror = rej;
			r.readAsDataURL(file);
		});
	}

	function escapeHtml(str) {
		return str
			.replace(/&/g, "&amp;")
			.replace(/</g, "&lt;")
			.replace(/>/g, "&gt;");
	}

	function render(msg) {
		const li = document.createElement("li");
		li.className = "msg";

		li.innerHTML = `
			${msg.image ? `<img src="${msg.image}">` : ""}
			<div class="msg-content">
				<div class="name">${escapeHtml(msg.name)}</div>
				<div class="text">${escapeHtml(msg.text)}</div>
			</div>
		`;

		messages.appendChild(li);
		messages.scrollTop = messages.scrollHeight;
	}

	// =====================
	// SEND (NO REFRESH EVER)
	// =====================
	form.addEventListener("submit", async (e) => {
		e.preventDefault();

		const text = input.value.trim();
		let image = null;

		if (imageFileInput.files.length > 0) {
			image = await fileToBase64(imageFileInput.files[0]);
		}

		if (!text && !image) return;

		socket.emit("chat message", {
			text,
			image
		});

		input.value = "";
		imageFileInput.value = "";
	});

	// =====================
	// RECEIVE
	// =====================
	socket.on("chat history", (history) => {
		messages.innerHTML = "";
		history.forEach(render);
	});

	socket.on("chat message", (msg) => {
		render(msg);
	});
</script>

</body>
</html>
