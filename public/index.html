<!DOCTYPE html>
<html>
<head>
	<title>chat thingy</title>

	<style>
		body {
			background: #eef2ff;
			font-family: "Times New Roman", serif;
			margin: 0;
			padding: 0;
		}

		#container {
			width: 700px;
			margin: 20px auto;
			background: white;
			border: 1px solid #aaa;
			padding: 10px;
		}

		h1 {
			font-size: 20px;
			margin: 0 0 10px 0;
			color: #800000;
		}

		#messages {
			list-style: none;
			padding: 0;
			margin: 0;
		}

		.msg {
			padding: 6px;
			border-bottom: 1px solid #ddd;
		}

		.name {
			color: #117743;
			font-weight: bold;
		}

		.text {
			color: #000;
		}

		form {
			margin-top: 10px;
		}

		input {
			width: 80%;
			padding: 5px;
			border: 1px solid #aaa;
			font-family: inherit;
		}

		button {
			padding: 5px 10px;
			border: 1px solid #888;
			background: #eee;
			cursor: pointer;
		}

		button:hover {
			background: #ddd;
		}

		.header {
			font-size: 12px;
			color: #555;
			margin-bottom: 10px;
		}
		
		.msg {
			display: flex;
			gap: 10px;
			align-items: flex-start;
			border-bottom: 1px solid #ddd;
			padding: 6px;
		}

		.msg img {
			max-width: 120px;
			max-height: 120px;
			border: 1px solid #aaa;
		}

		.msg-content {
			display: flex;
			flex-direction: column;
		}
		
	</style>
</head>
<body>

<div id="container">
	<h1>Chat :3</h1>
	<div class="header">chat thingy!!! todo: get this online</div>

	<!-- username input -->
	<ul id="messages"></ul>

	<form id="form">
		<input id="input" autocomplete="off" placeholder="type message..." />
		<button>post</button>
	</form>
	
	<input type="file" id="imageFile" accept="image/*" />
	

	<br>

	<div class="header"></div>
	<input id="username" placeholder="enter username" />

</div>

<script src="/socket.io/socket.io.js"></script>










<script>
	const socket = io();

	const form = document.getElementById("form");
	const input = document.getElementById("input");
	const usernameInput = document.getElementById("username");
	const messages = document.getElementById("messages");
	const imageFileInput = document.getElementById("imageFile");

	//attachment
	function fileToBase64(file) {
		return new Promise((resolve, reject) => {
			const reader = new FileReader();

			reader.onload = () => resolve(reader.result);
			reader.onerror = reject;

			reader.readAsDataURL(file);
		});
	}
	
	function renderMessage(msg) {
		const item = document.createElement("li");
		item.classList.add("msg");

		item.innerHTML = `
			${msg.image ? `<img src="${msg.image}">` : ""}
			<div class="msg-content">
				<span class="name">${msg.name}</span>
				<span class="text">${msg.text}</span>
			</div>
		`;

		messages.appendChild(item);
	}
	
	
	// load saved username
	usernameInput.value = localStorage.getItem("username") || "";

	// send username to server on change
	function updateUsername() {
		localStorage.setItem("username", usernameInput.value);
		socket.emit("set username", usernameInput.value);
	}

	usernameInput.addEventListener("input", updateUsername);

	// set initial username on connect
	socket.emit("set username", usernameInput.value);

	form.addEventListener("submit", async function(e) {
		e.preventDefault();

		let imageData = null;

		if (imageFileInput.files.length > 0) {
			imageData = await fileToBase64(imageFileInput.files[0]);
		}

		if (input.value.trim() !== "" || imageData) {
			socket.emit("chat message", {
				text: input.value,
				image: imageData
			});

			input.value = "";
			imageFileInput.value = "";
		}
	});

	socket.on("chat history", function(history) {
		history.forEach(renderMessage);
	});

	socket.on("chat message", function(msg) {
		renderMessage(msg);
		window.scrollTo(0, document.body.scrollHeight);
	});
	
	
</script>

</body>
</html>
